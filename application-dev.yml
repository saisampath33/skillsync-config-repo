spring:
  datasource:
    hikari:
      maximum-pool-size: 10
  jpa:
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    root: INFO
    com.skillsync: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: INFO
    org.springframework.cloud: INFO
    org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker: ERROR
    org.springframework.cloud.loadbalancer.config.LoadBalancerCaffeineWarnLogger: ERROR
    org.springframework.cloud.loadbalancer.config.LoadBalancerCacheAutoConfiguration$LoadBalancerCaffeineWarnLogger: ERROR
